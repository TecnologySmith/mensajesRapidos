/* ================= MODIFICAR PERSONALIZAR ================= */
function personalizarMensaje(mensaje){

    let mensajeFinal = mensaje.charAt(0).toUpperCase() + mensaje.slice(1);

    if(incluirHola){

/* ================= FORMATEAR FECHA ================= */
function formatearFecha(fecha, hora){

    if(!fecha || !hora) return "";

    const dias = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
    const meses = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];

    let f = new Date(fecha + "T00:00:00");

    let diaSemana = dias[f.getDay()];
    let dia = String(f.getDate()).padStart(2,'0');
    let mes = meses[f.getMonth()];

    return `${diaSemana} ${dia} de ${mes} a las ${hora}`;
}

${fechaTexto}`;
