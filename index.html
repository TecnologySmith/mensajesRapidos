<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Soporte Lizto Software</title>

<style>
body {margin:0;font-family:Arial;background:#121212;color:white;}
.main-container {display:flex;gap:20px;padding:20px;}
.main-column {flex:1;background:#1e1e1e;padding:15px;border-radius:10px;}
.modifier-btn,.msg-btn,.agent-btn {
padding:10px;border-radius:8px;border:none;cursor:pointer;
}
.modifier-btn.active {background:#00c3ff;color:black;}
textarea,input {width:100%;margin-top:10px;padding:10px;background:#1e1e1e;color:white;border:1px solid #00c3ff;border-radius:8px;}
</style>
</head>

<body>

<div class="main-container">

<!-- MENSAJES -->
<div class="main-column">
<h3>Mensajes</h3>

<div>
<button class="modifier-btn" onclick="toggleHola()">Hola</button>
<button class="modifier-btn" onclick="toggleDameMomento()">Dame un momento</button>
<button class="modifier-btn" onclick="toggleComoAyudar()">¿Cómo puedo ayudar?</button>
<button class="modifier-btn" onclick="toggleConMuchoGusto()">Con mucho gusto</button>
</div>

<input id="userInput" placeholder="Nombre cliente">

<textarea id="messageBox"></textarea>

</div>

<!-- AGENDAMIENTO -->
<div class="main-column">
<h3>Agendamiento</h3>

<input id="clienteData" placeholder="Nombre, teléfono">

<div>
<button onclick="seleccionarAgente('yeison')">Yeison</button>
<button onclick="seleccionarAgente('paola')">Paola</button>
</div>

<div id="agentTimes"></div>

<input type="date" id="fechaAgendamiento" onchange="actualizarAgendamiento()">

<textarea id="agendamientoOutput"></textarea>

</div>

<!-- CONFIRMACION -->
<div class="main-column">
<h3>Confirmación</h3>

<textarea id="confirmacionOutput"></textarea>

</div>

</div>

<script>

const horarios = {
yeison:{
'9 am':'link1',
'12 pm':'link2'
},
paola:{
'3 pm':'link3'
}
};

let agenteSeleccionado="";
let linkSeleccionado="";

function seleccionarAgente(a){
agenteSeleccionado=a;
const cont=document.getElementById("agentTimes");
cont.innerHTML="";

for(let h in horarios[a]){
let b=document.createElement("button");
b.textContent=h;
b.onclick=()=>seleccionarHora(horarios[a][h],b);
cont.appendChild(b);
}
}

function seleccionarHora(link,btn){
linkSeleccionado=link;
document.querySelectorAll("#agentTimes button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
actualizarAgendamiento();
}

function formatearFecha(fecha,hora){
if(!fecha)return "";

const dias=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const meses=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];

const f=new Date(fecha);

return `${dias[f.getDay()]} ${String(f.getDate()).padStart(2,'0')} de ${meses[f.getMonth()]} a las ${hora}`;
}

function actualizarAgendamiento(){
const datos=document.getElementById("clienteData").value;
const fecha=document.getElementById("fechaAgendamiento").value;

let hora="";
const btn=document.querySelector("#agentTimes .active");
if(btn)hora=btn.textContent;

const fechaFinal=formatearFecha(fecha,hora);

if(datos && linkSeleccionado && fecha){
document.getElementById("agendamientoOutput").value =
`${datos} - ${linkSeleccionado}\n${fechaFinal}`;
}else{
document.getElementById("agendamientoOutput").value="Completa datos";
}

actualizarConfirmacion();
}

function actualizarConfirmacion(){
const fecha=document.getElementById("fechaAgendamiento").value;

let hora="";
const btn=document.querySelector("#agentTimes .active");
if(btn)hora=btn.textContent;

const fechaFinal=formatearFecha(fecha,hora);

document.getElementById("confirmacionOutput").value =
`Te confirmo que ya hemos agendado tu reunión.
El día de la sesión te estaremos esperando en sala durante un máximo de 15 minutos ⏳.
Por favor recuerda ingresar puntualmente para aprovechar al máximo el espacio 🙌.

Te comparto el link de acceso: ${linkSeleccionado}

${fechaFinal}`;
}

/* BOTONES */

let incluirHola=false;
let incluirDameMomento=false;
let incluirComoAyudar=false;
let incluirConMuchoGusto=false;

function toggleHola(){incluirHola=!incluirHola;}
function toggleDameMomento(){incluirDameMomento=!incluirDameMomento;}
function toggleComoAyudar(){incluirComoAyudar=!incluirComoAyudar;}
function toggleConMuchoGusto(){incluirConMuchoGusto=!incluirConMuchoGusto;}

</script>

</body>
</html>
