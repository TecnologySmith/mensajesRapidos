<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soporte Lizto Software</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/M5QnCZR1/images.jpg">

    <style>
        /* === ESTILOS GENERALES === */
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #121212; /* Fondo oscuro */
            color: #f1f1f1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* === ENCABEZADO === */
        header {
            text-align: center;
            padding: 20px;
            background-color: #1c1c1c;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        header h1 {
            color: #00c3ff;
            margin: 0;
            text-shadow: 0 0 8px rgba(0, 195, 255, 0.4);
        }

        /* === CONTENEDOR PRINCIPAL - DIVIDE EN 2 COLUMNAS === */
        .main-container {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
        }

        .main-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 15px;
            background-color: #1e1e1e;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        /* Ajuste de columnas */
        .mensajes-rapidos {
            flex: 1.2;
        }
        .agendamientos {
            flex: 1.8;
        }

        /* Sub-layout para agendamientos */
        .agendamiento-layout {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .agendamiento-subcol {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* === TÍTULOS DE SECCIÓN === */
        .section-title {
            color: #00c3ff;
            border-bottom: 2px solid #00c3ff;
            padding-bottom: 5px;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        /* === BOTONES GENERALES === */
        .top-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 10px;
            border-radius: 10px;
        }
        
        /* Contenedor para los botones de Saludo/Modificadores */
        .modifier-buttons-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .msg-btn, .agent-btn, .modifier-btn {
            padding: 10px 14px;
            background-color: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #f1f1f1;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            flex-grow: 0;
        }
        
        /* Estilo para los botones Modificadores */
        .modifier-btn {
            font-size: 1.1em;
            padding: 10px 15px;
            background-color: #2a2a2a; /* Cambio para que no se vea activo por defecto */
            color: #f1f1f1;
            border-color: #3a3a3a;
            font-weight: bold;
        }

        .msg-btn:hover:not(.active), .agent-btn:hover:not(.active), .modifier-btn:hover:not(.active) {
            background-color: #00c3ff;
            color: #121212;
            transform: translateY(-2px);
        }

        /* Indicador de botón ACTIVO */
        .agent-btn.active, .time-btn.active, .modifier-btn.active {
            background-color: #00c3ff !important;
            color: #121212 !important;
            border-color: #00a8e1 !important;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 195, 255, 0.5);
        }

        @media (min-width: 768px) {
            .modifier-buttons-container {
                justify-content: space-evenly;
            }
        }
        
        .input-box, .agent-input-box {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        #userInput, #clienteData, #agendamientoOutput, #confirmacionOutput, #fechaAgendamiento {
            width: 100%;
            padding: 10px;
            border: 1px solid #00c3ff;
            border-radius: 8px;
            background-color: #1e1e1e;
            color: #f1f1f1;
            outline: none;
            box-sizing: border-box;
        }

        #fechaAgendamiento {
            color-scheme: dark;
            cursor: pointer;
        }

        #userInput:focus, #clienteData:focus {
            box-shadow: 0 0 8px rgba(0, 195, 255, 0.6);
        }

        .message-area {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            flex-grow: 1;
        }

        #messageBox {
            width: 100%;
            height: 300px;
            background-color: #1c1c1c;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            color: #eaeaea;
            resize: none;
            font-size: 15px;
            line-height: 1.5;
            outline: none;
            flex-grow: 1;
        }

        .agendamiento-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .agent-times {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            min-height: 45px;
            margin-bottom: 10px;
        }

        #copyBtn, #copyAgentBtn, #copyConfirmBtn {
            padding: 10px 20px;
            background-color: #00c3ff;
            color: #121212;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            height: 45px;
            align-self: center;
        }

        #copyAgentBtn, #copyConfirmBtn {
            width: 100%;
            margin-top: 10px;
        }

        #copyBtn:hover, #copyAgentBtn:hover, #copyConfirmBtn:hover {
            background-color: #00a8e1;
        }
        
        #agendamientoOutput, #confirmacionOutput {
            height: 150px;
            margin-top: 10px;
            resize: none;
        }

        #copy-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #4CAF50; /* Verde */
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-thumb {
            background: #00c3ff;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        @media (max-width: 992px) {
            .main-container {
                flex-direction: column;
            }
        }
        @media (max-width: 768px) {
            .message-area {
                flex-direction: column;
            }
            #copyBtn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div id="copy-notification">Copiado ✅</div>

    <header>
        <h1>Soporte y Atención al Cliente Lizto Software</h1>
    </header>

    <div class="main-container">

        <div class="main-column mensajes-rapidos">
            <div class="section-title">Mensajes de Soporte</div>
            
            <div class="modifier-buttons-container">
                <button id="holaBtn" class="modifier-btn" onclick="toggleModifier('hola')">Hola (Inicio)</button>
                <button id="dameMomentoBtn" class="modifier-btn" onclick="toggleModifier('momento')">Dame un momento</button>
                <button id="comoAyudarBtn" class="modifier-btn" onclick="toggleModifier('ayuda')">¿Cómo puedo ayudar?</button>
                <button id="conGustoBtn" class="modifier-btn" onclick="toggleModifier('gusto')">Con mucho gusto</button>
            </div>

            <div class="top-buttons">
                <button class="msg-btn" onclick="mostrarMensaje('repcontingencia')">Caso asignado</button>
                <button class="msg-btn" onclick="mostrarMensaje('daysMessage')">Saludo Días</button>
                <button class="msg-btn" onclick="mostrarMensaje('afternoonMessage')">Saludo Tardes</button>
                <button class="msg-btn" onclick="mostrarMensaje('pagoRealizadoMessage')">Confirmación de Pago</button>
                <button class="msg-btn" onclick="mostrarMensaje('pagoGraciasMessage')">Agradecimiento Pago</button>
                <button class="msg-btn" onclick="mostrarMensaje('solicitarLinkMessage')">Solicitud Soporte Pago</button>
                <button class="msg-btn" onclick="mostrarMensaje('despedidaMessage')">Despedida</button>
                <button class="msg-btn" onclick="mostrarMensaje('linkReunionMessage')">Enlace Reunión</button>
                <button class="msg-btn" onclick="mostrarMensaje('sinRespuesta')">Sin Respuesta</button>
                <button class="msg-btn" onclick="mostrarMensaje('linkPago')">Link de Pago</button>
                <button class="msg-btn" onclick="mostrarMensaje('pasoaPaso')">Paso a Paso</button>
                <button class="msg-btn" onclick="mostrarMensaje('dameunMomento')">Dame un Momento</button>
                <button class="msg-btn" onclick="mostrarMensaje('algoMas')">¿Algo Más?</button>
            </div>

            <div class="input-box">
                <label for="userInput">Nombre del Cliente (Para Saludo)</label>
                <input type="text" id="userInput" placeholder="Ej: Juan Pérez" oninput="actualizarMensajeActual()" />
            </div>

            <div class="message-area">
                <textarea id="messageBox" readonly placeholder="Selecciona un mensaje arriba..."></textarea>
                <button id="copyBtn" onclick="copiarTexto('messageBox')">Copiar</button>
            </div>
        </div>

        <div class="main-column agendamientos">
            <div class="section-title">Agendamientos y Enlaces</div>

            <div class="agendamiento-layout">
                <div class="agendamiento-subcol">
                    <div class="agent-input-box">
                        <label for="clienteData">Datos del Cliente (Nombre, Teléfono)</label>
                        <input type="text" id="clienteData" placeholder="Ej: Lola, 3108765646" oninput="actualizarAgendamiento()" />
                    </div>

                    <div class="agendamiento-buttons">
                        <button class="agent-btn" id="btnYeison" onclick="seleccionarAgente('yeison')">Yeison</button>
                        <button class="agent-btn" id="btnPaola" onclick="seleccionarAgente('paola')">Paola</button>
                    </div>
                    
                    <div class="agent-times" id="agentTimes"></div>

                    <div class="input-box">
                        <label for="fechaAgendamiento">Fecha de la Reunión</label>
                        <input type="date" id="fechaAgendamiento" onchange="actualizarAgendamiento()">
                    </div>

                    <textarea id="agendamientoOutput" readonly placeholder="El mensaje de agendamiento aparecerá aquí..."></textarea>
                    <button id="copyAgentBtn" onclick="copiarTexto('agendamientoOutput')">Copiar Agendamiento</button>
                </div>

                <div class="agendamiento-subcol">
                    <label>Mensaje de Confirmación Detallada:</label>
                    <textarea id="confirmacionOutput" readonly placeholder="Selecciona fecha, hora y datos para generar la confirmación..."></textarea>
                    <button id="copyConfirmBtn" onclick="copiarTexto('confirmacionOutput')">Copiar Confirmación</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* =======================================================
         * SECCIÓN DE MENSAJES RÁPIDOS
         * ======================================================= */
        const mensajes = {
            repcontingencia: "¿cómo estás? Hablas con Yeison Hernandez del equipo de soporte de Lizto, me asignaron tu caso para poderte ayudar",
            daysMessage: "buenos días, ¿cómo estás? Hablas con Yeison Hernandez del equipo de soporte de Lizto. ",
            afternoonMessage: "buenas tardes, ¿cómo estás? Hablas con Yeison Hernandez del equipo de soporte de Lizto. ",
            pagoRealizadoMessage: "¿cómo estás? Hablas con Yeison Hernandez del equipo de soporte de Lizto. Mil gracias por el pago. Ya puedes ingresar.",
            pagoGraciasMessage: "con mucho gusto, indícame el NIT del salón para solicitarlo al área contable.",
            solicitarLinkMessage: "¿cómo estás? Hablas con Yeison Hernandez del equipo de soporte de Lizto. Mil disculpas, el sistema entró en suspensión automática al no detectar el pago. ¿Me puedes enviar el soporte de pago y el NIT para verificarlo con contabilidad?",
            despedidaMessage: "ha sido un gusto ayudarte. Si necesitas más ayuda, no dudes en contactarnos. ¡Te deseo un excelente día!",
            linkReunionMessage: "al correo te acabamos de enviar el link de la reunión. ¿Me confirmas por favor si te llegó?",
            sinRespuesta: "Esperamos que la solución brindada haya resuelto tu caso. Cuando tengas un momento, ¿podrías confirmarnos si todo está en orden? Al no tener respuesta, procederemos a cerrar el ticket, pero si tienes otra consulta estaremos atentos para ayudarte.",
            linkPago: "puedes realizar el pago en este link:",
            pasoaPaso: "En este paso a paso te mostramos cómo puedes hacerlo. Si tienes alguna duda, me comentas por favor.",
            dameunMomento: "dame un momento por favor, vamos a verificar.",
            algoMas: "con mucho gusto, ¿hay algo más en lo que te podamos colaborar?"
        };

        let mensajeActual = ""; 
        let modifiers = {
            hola: false,
            momento: false,
            ayuda: false,
            gusto: false
        };

        function toggleModifier(type) {
            modifiers[type] = !modifiers[type];
            const btnId = type === 'hola' ? 'holaBtn' : 
                          type === 'momento' ? 'dameMomentoBtn' : 
                          type === 'ayuda' ? 'comoAyudarBtn' : 'conGustoBtn';
            
            // Aquí se gestiona el indicador visual del botón activo
            document.getElementById(btnId).classList.toggle('active', modifiers[type]);
            
            if (mensajeActual) actualizarMensajeActual();
        }

        function mostrarMensaje(id) {
            mensajeActual = id;
            if (id === 'sinRespuesta') {
                modifiers.hola = false;
                document.getElementById('holaBtn').classList.remove('active');
            }
            actualizarMensajeActual();
        }

        function personalizarMensaje(mensaje) {
            const nombre = document.getElementById("userInput").value.trim();
            let mensajeFinal = mensaje.charAt(0).toUpperCase() + mensaje.slice(1);
            const esMensajeExcluidoDeHola = mensaje.startsWith("Esperamos");

            if (nombre) {
                mensajeFinal = `${nombre}, ${mensajeFinal}`;
            }
            
            if (modifiers.hola && !esMensajeExcluidoDeHola) {
                if (nombre) {
                    mensajeFinal = mensajeFinal.replace(`${nombre}, `, `Hola ${nombre}, `);
                } else {
                    mensajeFinal = `Hola, ${mensajeFinal}`;
                }
            }
            
            let suffix = "";
            if (modifiers.gusto) suffix += (suffix ? " con" : " Con") + " mucho gusto.";
            if (modifiers.momento) suffix += " Dame un momento por favor.";
            if (modifiers.ayuda) suffix += (suffix ? " ¿cómo" : " ¿Cómo") + " puedo ayudarte?";
            

            if (suffix.length > 0) {
                if (!mensajeFinal.trim().endsWith('.') && !mensajeFinal.trim().endsWith('!') && !mensajeFinal.trim().endsWith('?')) {
                    mensajeFinal += ".";
                }
                mensajeFinal += suffix;
            }

            return mensajeFinal;
        }

        function actualizarMensajeActual() {
            if (!mensajeActual) return;
            const mensajeBase = mensajes[mensajeActual];
            document.getElementById("messageBox").value = personalizarMensaje(mensajeBase);
        }

        function mostrarNotificacionCopiado() {
            const notification = document.getElementById('copy-notification');
            notification.style.opacity = 1;
            setTimeout(() => notification.style.opacity = 0, 2000);
        }

        function copiarTexto(elementId) {
            const box = document.getElementById(elementId);
            if (!box.value || box.value.includes('Ingresa los datos')) return;
            box.select();
            document.execCommand("copy");
            mostrarNotificacionCopiado();
        }

        /* =======================================================
         * SECCIÓN DE AGENDAMIENTOS
         * ======================================================= */
        const horarios = {
            yeison: { '9am': 'https://us06web.zoom.us/j/86553506923', '11am': 'https://us06web.zoom.us/j/84015173788', '3pm': 'https://us06web.zoom.us/j/86502199583', '5pm': 'https://us06web.zoom.us/j/89901352812' },
            paola: { '9am': 'https://us06web.zoom.us/j/84560427915', '12pm': 'https://us06web.zoom.us/j/87186962523', '4pm': 'https://us06web.zoom.us/j/81938853734' }
        };

        let agenteSeleccionado = '';
        let linkSeleccionado = '';
        let horaSeleccionada = '';

        function seleccionarAgente(agente) {
            agenteSeleccionado = agente;
            linkSeleccionado = '';
            horaSeleccionada = '';
            document.getElementById('btnYeison').classList.remove('active');
            document.getElementById('btnPaola').classList.remove('active');
            document.getElementById(`btn${agente.charAt(0).toUpperCase() + agente.slice(1)}`).classList.add('active');

            const timesContainer = document.getElementById('agentTimes');
            timesContainer.innerHTML = '';
            const agentHorarios = horarios[agente];

            for (const hora in agentHorarios) {
                const btn = document.createElement('button');
                btn.className = 'msg-btn time-btn';
                btn.textContent = hora;
                btn.onclick = (e) => {
                    linkSeleccionado = agentHorarios[hora];
                    horaSeleccionada = hora;
                    document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    actualizarAgendamiento();
                };
                timesContainer.appendChild(btn);
            }
            actualizarAgendamiento();
        }

        function formatFecha(fechaStr) {
            if (!fechaStr) return "";
            const fecha = new Date(fechaStr + 'T00:00:00');
            const opciones = { weekday: 'long', day: '2-digit', month: 'long' };
            let formateada = fecha.toLocaleDateString('es-ES', opciones);
            return formateada.charAt(0).toUpperCase() + formateada.slice(1);
        }

        function actualizarAgendamiento() {
            const datosCliente = document.getElementById('clienteData').value.trim();
            const fechaInput = document.getElementById('fechaAgendamiento').value;
            const outputBox = document.getElementById('agendamientoOutput');
            const confirmBox = document.getElementById('confirmacionOutput');

            const fechaTexto = formatFecha(fechaInput);

            if (datosCliente && linkSeleccionado) {
                outputBox.value = `${datosCliente} - únete a la reunión aquí: ${linkSeleccionado}`;
            } else {
                outputBox.value = 'Ingresa los datos del cliente y selecciona un agente y una hora.';
            }

            if (linkSeleccionado && horaSeleccionada && fechaInput) {
                confirmBox.value = `Te confirmo que ya hemos agendado tu reunión.
El día de la sesión te estaremos esperando en sala durante un máximo de 15 minutos ⏳.
Por favor recuerda ingresar puntualmente para que podamos aprovechar al máximo el espacio juntos 🙌.

Te comparto el link de acceso: ${linkSeleccionado}
${fechaTexto} a las ${horaSeleccionada}`;
            } else {
                confirmBox.value = "Faltan datos (Fecha u Hora) para generar la confirmación.";
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
             seleccionarAgente('yeison');
        });
    </script>
</body>
</html>
